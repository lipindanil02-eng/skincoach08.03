services:
  - type: web
    name: skincoach-web
    env: python
    buildCommand: cd web/backend && pip install -r requirements.txt
    startCommand: cd web/backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: DATABASE_URL
        fromDatabase:
          name: skincoach-web-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ADMIN_USERNAME
        value: kinesispro
      - key: ORIGINS
        value: "*"

databases:
  - name: skincoach-web-db
    databaseName: skincoach_web
    user: skincoach_web
    plan: free
